# config/config.yaml

# ================= 全局默认配置 =================
defaults:
#  dify_base_url: "http://121.43.154.99/v1" # Dify 私有部署的默认地址
  dify_base_url: "http://8.154.28.99/v1"

# ================= 日志配置 =================
logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  
  # 日志输出目录
  log_dir: "logs"
  
  # 是否启用控制台输出
  console_enabled: true
  
  # 是否启用文件输出
  file_enabled: true
  
  # 日志文件保留天数
  retention_days: 30

# ================= 智能体列表 =================
agents:
  xiaofang:
    platform: "dify"                        # 【必填】用于识别平台
    api_key: "app-skt8y7ghIb7WUtL62gQOhu0D"
    mode: "chat"

  # --- 场景1: Dify 上的初诊 (Chat类型) ---
  first_visit:
    platform: "dify"                        # 【必填】用于识别平台
    api_key: "app-SGOScn0t6ASzcZgvhEtvxCAA"
    mode: "chat"
    # base_url: 可以不填，代码里会自动继承 defaults

  # --- 场景2: Dify 上的复诊执行待办 (Workflow类型) ---
  todo_exec_follow:
    platform: "dify"
    api_key: "app-Si1mBopNllVccedgyrCpNSvQ"
    mode: "workflow"
  # --- 场景2: Dify 上的初诊诊执行待办 (Workflow类型) ---
  todo_exec_first:
    platform: "dify"
    api_key: "app-x17wDNtcWbo2J0sy353vsVQ6"
    mode: "workflow"

  follow_up:
    platform: "dify"
    api_key: "app-jUGG3OQJG0DhwkUSzqqfY6QV"
    mode: "chat"

  # --- 场景3: Coze 上的智能体 (完全不同的参数) ---
  coze_bot_v1:
    platform: "coze"
    bot_id: "7388XXXXXX"                    # Coze特有
    auth_token: "pat-XXXXXX"                # Coze特有
    user_id: "test_user"                    # Coze特有

  # --- 场景4: 百度千帆 (完全不同的参数) ---
  qianfan_demo:
    platform: "qianfan"
    access_key: "ALTAkV..."
    secret_key: "bc868..."
  patient_summary:
    platform: "dify"                        # 【必填】用于识别平台
    api_key: "app-f70jzLU0iKgAg6pNqvly9UU1"
    mode: "chat"                            # Dify特有: chat 或 workflow

# LLM 裁判配置 (用于自动化评估)
judge:
  enabled: true
  provider: "dify"
  api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxx" # 保留旧的 key 兼容
  model: "ChatGPT5.1"
  # Dify 评估智能体配置
  dify_config:
    platform: "dify"
    api_key: "app-r6DI6naJxcjn7vRKajoyQ5w9"  # 请替换为评估 Agent 的 Key
    base_url: "http://121.43.154.99/v1"
    timeout: 180  # 超时时间（秒），默认 180 秒（3 分钟）
  # 评分阈值，低于此分数视为失败
  pass_threshold: 8

# 测试报告配置
report:
  title: "小方智能体回归测试报告"
  language: "zh-CN"

# Baseline 配置（支持按智能体区分）
baseline:
  # 是否启用按智能体保存/对比 baseline
  per_agent: false
  # 默认 baseline 名称前缀
  default: "baseline"
  # 按智能体指定 baseline 名称（可选）
  by_agent:
    first_visit: "baseline_first_visit"
    todo_exec_follow: "baseline_todo_exec_follow"
    todo_exec_first: "baseline_todo_exec_first"
    follow_up: "baseline_follow_up"
    patient_summary: "baseline_patient_summary"


# 测试执行策略配置
runner:
  # 并发执行线程数 (依赖 pytest-xdist)
  # 设置为 "auto" 则自动使用 CPU 核心数，设置为 1 则单线程顺序执行
  concurrency: 4

  # 重复执行
  repeat: 1
  # 【新增】LLM 评估配置
  llm_eval_config:
    # 对同一个 AI 响应进行多次 LLM 评估的次数，取平均值以减少随机性
    num_evaluations: 3


  # 失败重试次数 (依赖 pytest-rerunfailures)
  # 针对 Dify/LLM 网络波动，建议设置 1-2 次
  reruns: 2
  rerun_delay: 2 # 重试间隔秒数

  # 测试用例路径
  test_path: "src/tests/"

  # 报告存放路径
  report_temp_dir: "./reports/temp"  # Allure 原始 JSON 数据
  report_html_dir: "./reports/html"  # 生成的 HTML 网页

  # 是否在测试结束后自动打开浏览器预览报告 (CI 环境建议设为 false)
  auto_open_report: true

# 测试数据配置
test_data:
  # 要加载的测试文件列表
  files:
#     - "xiaofang_fz_chat.csv"
#     - "xiaofang_cz_chat.csv"
     - "xiaofang_new_chat.csv"
#     - "patient_summary_chat.csv"
#     - "xiaofang_fz_todo.csv"
  
  # 过滤条件（可选）
  filter:
     case_ids: ["CZ_CASE_01"]  # 只执行指定用例
    # target_agents: ["follow_up"]      # 只执行指定智能体
    # tags: ["Reply"]                   # 包含指定标签
    # enabled: true                     # 只执行启用的用例
